services:
  infinite-canvas:
    build: .
    container_name: infinite-canvas
    ports:
      - "3010:3000"
    volumes:
      # 持久化数据目录，容器重建后数据不丢失
      - ./data:/app/data
      - ./output:/app/output
      - ./assets:/app/assets
      - ./API:/app/API
      - ./workflows:/app/workflows
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
